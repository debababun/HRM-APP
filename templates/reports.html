<!DOCTYPE html>
<html>
<head>
    <title>Generate Report</title>
</head>
<body>

<h2>📊 Generate Report</h2>

<form method="post">

<label>Report Type:</label><br>
<select name="report_type" required>
    <option value="pme">PME Due</option>
    <option value="gr">GR/SR Due</option>
    <option value="tech">Tech Ref Due</option>
    <option value="gradation">Gradation Due</option>
</select>
<br><br>

<label>Designation:</label><br>
<select name="designation">
    <option value="ALL">ALL</option>
    {% for d in designations %}
        <option value="{{ d }}">{{ d }}</option>
    {% endfor %}
</select>
<br><br>

<label>Bill Unit:</label><br>
<select name="bill_unit">
    <option value="ALL">ALL</option>
    {% for b in bill_units %}
        <option value="{{ b }}">{{ b }}</option>
    {% endfor %}
</select>
<br><br>

<label>Period Type:</label><br>
<select name="period_type" required>
    <option value="monthly">Monthly</option>
    <option value="quarterly">Quarterly</option>
    <option value="yearly">Yearly</option>
</select>
<br><br>

<label>Year:</label><br>
<input type="number" name="year" required>
<br><br>

<label>Month (1-12 if Monthly):</label><br>
<input type="number" name="month">
<br><br>

<label>Quarter (1-4 if Quarterly):</label><br>
<input type="number" name="quarter">
<br><br>

<button type="submit">Generate Report</button>

</form>

<br>
<a href="/dashboard">⬅ Back to Dashboard</a>
<hr>

<h3>📄 Generate Monthly Leave Absentee Statement</h3>

<form method="post" action="/reports/leave-absentee">

<label>Bill Unit:</label><br>
<input type="text" name="bill_unit" required><br><br>

<label>Year:</label><br>
<input type="number" name="year" required><br><br>

<label>Month (1-12):</label><br>
<input type="number" name="month" required><br><br>

<label>No:</label><br>
<input type="text" name="letter_no" required><br><br>

<label>From:</label><br>
<input type="text" name="from_officer" required><br><br>

<label>To:</label><br>
<input type="text" name="to_officer" required><br><br>

<label>Dept:</label><br>
<input type="text" name="dept" required><br><br>

<button type="submit">Generate Absentee DOCX</button>

</form>
</body>
</html>
